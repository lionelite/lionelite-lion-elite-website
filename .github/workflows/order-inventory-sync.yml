name: Order Inventory Sync

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync-orders:
    name: Monitor orders email and sync Orchids website inventory
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Read orders and sync inventory
        env:
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          GOOGLE_REFRESH_TOKEN: ${{ secrets.GOOGLE_REFRESH_TOKEN }}
          ORDER_EMAIL_QUERY: 'from:orders@lionelitewellness.com newer_than:2d "🛒 New Order"'
        run: |
          python - <<'PY'
          import base64
          import json
          import os
          import pathlib
          import re
          import urllib.parse
          import urllib.request
          from datetime import datetime, timezone

          required = ['GOOGLE_CLIENT_ID', 'GOOGLE_CLIENT_SECRET', 'GOOGLE_REFRESH_TOKEN']
          missing = [key for key in required if not os.environ.get(key)]
          if missing:
              print('Google OAuth secrets missing. Skipping live Gmail sync:', ', '.join(missing))
              raise SystemExit(0)

          inventory_path = pathlib.Path('public/data/current-inventory.json')
          processed_path = pathlib.Path('data/orders/processed-order-ids.json')
          processed_path.parent.mkdir(parents=True, exist_ok=True)

          def read_json(path, default):
              if path.exists():
                  return json.loads(path.read_text(encoding='utf-8'))
              return default

          inventory = read_json(inventory_path, {'items': [], 'source': {}})
          processed = set(read_json(processed_path, []))

          def token():
              data = urllib.parse.urlencode({
                  'client_id': os.environ['GOOGLE_CLIENT_ID'],
                  'client_secret': os.environ['GOOGLE_CLIENT_SECRET'],
                  'refresh_token': os.environ['GOOGLE_REFRESH_TOKEN'],
                  'grant_type': 'refresh_token'
              }).encode('utf-8')
              req = urllib.request.Request('https://oauth2.googleapis.com/token', data=data, method='POST')
              with urllib.request.urlopen(req, timeout=60) as response:
                  return json.loads(response.read().decode('utf-8'))['access_token']

          access_token = token()

          def gmail_get(url):
              req = urllib.request.Request(url, headers={'Authorization': f'Bearer {access_token}'})
              with urllib.request.urlopen(req, timeout=60) as response:
                  return json.loads(response.read().decode('utf-8'))

          query = urllib.parse.quote(os.environ.get('ORDER_EMAIL_QUERY', 'from:orders@lionelitewellness.com newer_than:2d'))
          messages = gmail_get(f'https://gmail.googleapis.com/gmail/v1/users/me/messages?q={query}&maxResults=25').get('messages', [])

          def body_from_payload(payload):
              data = payload.get('body', {}).get('data')
              if data:
                  return base64.urlsafe_b64decode(data + '===').decode('utf-8', errors='ignore')
              bodies = []
              for part in payload.get('parts') or []:
                  bodies.append(body_from_payload(part))
              return '\n'.join([b for b in bodies if b])

          aliases = {
              'retatrutide': 'Retatrutide',
              'cjc-1295 / ipamorelin blend': 'CJC / Ipamorelin',
              'cjc / ipamorelin': 'CJC / Ipamorelin',
              'klow blend 80mg': 'KLOW Blend',
              'klow blend': 'KLOW Blend',
              'mots-c': 'MOTS-c',
              'mots - c': 'MOTS-c',
              'nad+ 1000mg': 'NAD+',
              'nad+ 500mg': 'NAD+',
              'nad+': 'NAD+',
              'ghkcu': 'GHK-Cu',
              'ghk-cu': 'GHK-Cu',
              'bpc 157 / tb 500': 'BPC 157 / TB 500',
              'tesamorelin': 'Tesamorelin',
              'bacteriostatic water': 'Bacteriostatic Water',
              'aod9604': 'AOD9604'
          }

          def normalize_name(raw):
              low = re.sub(r'\s+', ' ', raw).strip().lower()
              for key, value in aliases.items():
                  if key in low:
                      return value
              return raw.strip()

          def dosage_from_name(raw):
              m = re.search(r'(\d+\s*mg)', raw, re.I)
              return m.group(1) if m else ''

          def decrement_item(name, dosage, qty):
              candidates = [item for item in inventory.get('items', []) if item.get('name', '').lower() == name.lower()]
              if dosage:
                  dose_num = re.sub(r'\D+', '', dosage)
                  dose_matches = [item for item in candidates if dose_num and dose_num in re.sub(r'\D+', '', item.get('dosage', ''))]
                  if dose_matches:
                      candidates = dose_matches
              if not candidates:
                  return False
              item = candidates[0]
              item['units'] = max(0, int(item.get('units') or 0) - qty)
              if item['units'] == 0:
                  item['status'] = 'out_of_stock'
              elif item['units'] <= 5:
                  item['status'] = 'low_stock'
              else:
                  item['status'] = 'in_stock'
              return True

          applied = []
          for message_ref in messages:
              message_id = message_ref['id']
              if message_id in processed:
                  continue
              message = gmail_get(f'https://gmail.googleapis.com/gmail/v1/users/me/messages/{message_id}?format=full')
              headers = {h['name'].lower(): h['value'] for h in message.get('payload', {}).get('headers', [])}
              subject = headers.get('subject', '')
              if 'New Order' not in subject and '🛒' not in subject:
                  processed.add(message_id)
                  continue
              body = re.sub(r'<[^>]+>', '\n', body_from_payload(message.get('payload', {})))
              product_block = body.split('Product')[-1]
              for product, qty in re.findall(r'([^\n]+?)\s*\n\s*(\d+)\s*\n\s*\$?\d', product_block):
                  raw = product.strip()
                  if not raw or raw.lower() in {'qty', 'price'}:
                      continue
                  name = normalize_name(raw)
                  dosage = dosage_from_name(raw)
                  quantity = int(qty)
                  if decrement_item(name, dosage, quantity):
                      applied.append({'message_id': message_id, 'subject': subject, 'product': name, 'dosage': dosage, 'qty': quantity})
              processed.add(message_id)

          inventory.setdefault('source', {})['last_synced_from_orders_utc'] = datetime.now(timezone.utc).isoformat()
          inventory.setdefault('source', {})['orders_email_query'] = os.environ.get('ORDER_EMAIL_QUERY')
          inventory_path.parent.mkdir(parents=True, exist_ok=True)
          inventory_path.write_text(json.dumps(inventory, indent=2) + '\n', encoding='utf-8')
          processed_path.write_text(json.dumps(sorted(processed), indent=2) + '\n', encoding='utf-8')
          pathlib.Path('data/orders/latest-sync-report.json').write_text(json.dumps({'synced_at': datetime.now(timezone.utc).isoformat(), 'applied': applied}, indent=2) + '\n', encoding='utf-8')
          print(json.dumps({'processed_messages': len(messages), 'applied': applied}, indent=2))
          PY

      - name: Commit Orchids website inventory changes
        run: |
          git config user.name "Lion Elite Order Sync"
          git config user.email "actions@github.com"
          git add public/data/current-inventory.json data/orders/
          if git diff --cached --quiet; then
            echo "No inventory changes to commit."
          else
            git commit -m "Sync Orchids website inventory from order emails"
            git push
          fi
